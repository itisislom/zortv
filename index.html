<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmWorks Embed Player</title>
    <!-- Подключаем hls.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <!-- Иконки -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Сброс стилей */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            color: #fff;
        }

        /* Главный контейнер плеера */
        .player-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            background: #000;
            /* Скрываем курсор, когда интерфейс неактивен */
            cursor: default;
        }

        .player-container.hide-ui {
            cursor: none;
        }

        /* Видео */
        video { 
            width: 100%; 
            height: 100%;
            object-fit: contain;
            outline: none;
        }

        /* Обертка для всего интерфейса (поверх видео) */
        .player-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
            transition: opacity 0.3s ease;
            pointer-events: none; /* Пропускаем клики к видео, где нет кнопок */
        }

        .player-container.hide-ui .player-ui {
            opacity: 0;
        }

        /* Заголовок (верхний градиент) */
        .player-header {
            padding: 20px 20px 40px 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: auto; /* Возвращаем клики для шапки */
        }

        .header-icon {
            color: #ef4444; /* Красная иконка как у Live */
            font-size: 20px;
        }

        .player-title {
            font-size: 16px;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        /* Панель управления (нижний градиент) */
        .bottom-controls-wrapper {
            padding: 40px 20px 15px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
            pointer-events: auto;
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .control-group { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
        }

        /* Минималистичные кнопки */
        .btn {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            width: 30px;
        }

        .btn:hover {
            color: #38bdf8;
        }

        .btn:active {
            transform: scale(0.9);
        }

        /* Громкость */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 0; /* Скрыто по умолчанию на десктопе до наведения */
            height: 4px; 
            background: rgba(255, 255, 255, 0.3); 
            border-radius: 2px;
            cursor: pointer;
            transition: width 0.2s ease, margin 0.2s ease;
            opacity: 0;
        }

        .volume-container:hover .volume-slider,
        .volume-slider:focus {
            width: 70px;
            opacity: 1;
            margin-left: 5px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; 
            width: 12px; 
            height: 12px; 
            border-radius: 50%;
            background: #fff;
        }

        .volume-slider::-webkit-slider-runnable-track {
            height: 4px;
            border-radius: 2px;
        }

        /* Бейдж прямого эфира */
        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #d1d5db;
            text-transform: uppercase;
            cursor: pointer;
        }
        
        .live-badge.is-live {
            color: #ef4444; /* Красный цвет, когда онлайн */
        }

        .live-dot {
            width: 8px; height: 8px; background: #6b7280; border-radius: 50%;
        }

        .live-badge.is-live .live-dot {
            background: #ef4444;
            box-shadow: 0 0 6px #ef4444;
        }

        /* Подпись */
        .footer-credit {
            position: absolute;
            bottom: 55px;
            right: 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            pointer-events: none;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
        .footer-credit span { color: rgba(96, 165, 250, 0.6); }

        /* Огромная кнопка Play по центру (появляется при паузе) */
        .center-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.5);
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: #fff;
            cursor: pointer;
            pointer-events: auto;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 15;
            padding-left: 5px; /* Выравнивание треугольника */
        }
        
        .player-container.is-paused .center-play {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .player-container.is-paused.hide-ui .center-play {
            opacity: 0; /* Скрываем даже ее, если UI скрыт по таймауту */
        }

        /* Мобильная адаптация */
        @media (max-width: 600px) {
            .player-header { padding: 15px; }
            .bottom-controls-wrapper { padding: 30px 15px 10px 15px; }
            .volume-slider { 
                width: 60px; /* На мобилке показываем ползунок всегда */
                opacity: 1; 
                margin-left: 5px;
            }
            .control-group { gap: 15px; }
            .footer-credit { display: none; }
        }
    </style>
</head>
<body>

    <div class="player-container is-paused" id="playerContainer">
        
        <!-- Само видео -->
        <video id="videoPlayer" playsinline></video>

        <!-- Центральная кнопка Play (для мобилок и паузы) -->
        <div class="center-play" id="centerPlayBtn">
            <i class="fas fa-play"></i>
        </div>

        <!-- Оверлей интерфейса -->
        <div class="player-ui">
            <!-- Шапка -->
            <div class="player-header">
                <i class="fa-solid fa-satellite-dish header-icon"></i>
                <div class="player-title" id="headerText">Трансляция ZO'R TV от FilmWorks</div>
            </div>

            <div class="footer-credit">Made by <span>Islom Sadriddinov</span></div>

            <!-- Нижняя панель -->
            <div class="bottom-controls-wrapper">
                <div class="controls-row">
                    
                    <!-- Левая часть -->
                    <div class="control-group">
                        <button class="btn" id="playPauseBtn" title="Воспроизвести">
                            <i class="fas fa-play" id="playIcon"></i>
                        </button>
                        
                        <div class="volume-container">
                            <button class="btn" id="muteBtn" title="Звук">
                                <i class="fas fa-volume-up" id="volumeIcon"></i>
                            </button>
                            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">
                        </div>

                        <div class="live-badge is-live" id="liveBadge" title="Синхронизация...">
                            <div class="live-dot"></div> <span id="liveText">Эфир</span>
                        </div>
                    </div>

                    <!-- Правая часть -->
                    <div class="control-group">
                        <button class="btn" id="fullscreenBtn" title="Во весь экран">
                            <i class="fas fa-expand" id="fsIcon"></i>
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Локализация ---
        const dictionary = {
            ru: { header: "Трансляция ZO'R TV", play: "Воспроизвести", pause: "Пауза", syncing: "Синхронизация...", connected: "Эфир" },
            uz: { header: "ZO'R TV jonli efiri", play: "Ijro etish", pause: "To'xtatish", syncing: "Sinxron...", connected: "Efir" }
        };

        const userLang = navigator.language.toLowerCase().includes('uz') ? 'uz' : 'ru';
        const t = dictionary[userLang];

        document.getElementById('headerText').innerText = t.header;
        document.getElementById('liveText').innerText = t.syncing;
        document.documentElement.lang = userLang;

        // --- Элементы DOM ---
        const container = document.getElementById('playerContainer');
        const video = document.getElementById('videoPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const centerPlayBtn = document.getElementById('centerPlayBtn');
        const playIcon = document.getElementById('playIcon');
        const muteBtn = document.getElementById('muteBtn');
        const volumeIcon = document.getElementById('volumeIcon');
        const volumeSlider = document.getElementById('volumeSlider');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const fsIcon = document.getElementById('fsIcon');
        const liveBadge = document.getElementById('liveBadge');
        const liveText = document.getElementById('liveText');

        // --- HLS Логика ---
        const videoSrc = "https://stream8-uzbeeline.platform24.tv/mbrjwt/3b3bd2185a7c7e3403270d0cb06f5d2c77837e90-4783-0-uzt6061235-5-1587428585-1784054005-e128-66TRwuSTmhXtawqp1n38u_YUCHBbcGfaPqBe22_Oukc/0.m3u8?pid=256";
        const audioSrc = "https://stream8-uzbeeline.platform24.tv/mbrjwt/3b3bd2185a7c7e3403270d0cb06f5d2c77837e90-4783-0-uzt6061235-5-1587428585-1784054005-e128-66TRwuSTmhXtawqp1n38u_YUCHBbcGfaPqBe22_Oukc/2.m3u8?pid=259";

        const masterManifest = `
#EXTM3U
#EXT-X-MEDIA:TYPE=AUDIO,GROUP-ID="audio_group",NAME="MainAudio",DEFAULT=YES,AUTOSELECT=YES,URI="${audioSrc}"
#EXT-X-STREAM-INF:BANDWIDTH=2500000,AUDIO="audio_group"
${videoSrc}
        `.trim();

        if (Hls.isSupported()) {
            const blob = new Blob([masterManifest], { type: 'application/vnd.apple.mpegurl' });
            const blobUrl = URL.createObjectURL(blob);
            const hls = new Hls({ liveSyncDurationCount: 3, maxBufferLength: 8, enableWorker: true });

            hls.loadSource(blobUrl);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                liveText.innerText = t.connected;
                liveBadge.classList.add('is-live');
            });
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    liveBadge.classList.remove('is-live');
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
                    else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
                }
            });
        }

        // --- Логика отображения/скрытия интерфейса (как в YouTube) ---
        let uiTimeout;
        function showUI() {
            container.classList.remove('hide-ui');
            clearTimeout(uiTimeout);
            // Скрываем интерфейс через 2.5 секунды, если видео играет
            if (!video.paused) {
                uiTimeout = setTimeout(() => {
                    container.classList.add('hide-ui');
                }, 2500);
            }
        }

        // События активности пользователя
        container.addEventListener('mousemove', showUI);
        container.addEventListener('touchstart', showUI);
        container.addEventListener('click', showUI);
        container.addEventListener('mouseleave', () => {
            if (!video.paused) container.classList.add('hide-ui');
        });

        // --- Управление видео ---
        function togglePlay() {
            if (video.paused) {
                video.play();
                container.classList.remove('is-paused');
                playIcon.className = "fas fa-pause";
                playPauseBtn.title = t.pause;
                showUI(); // Запускаем таймер скрытия
            } else {
                video.pause();
                container.classList.add('is-paused');
                playIcon.className = "fas fa-play";
                playPauseBtn.title = t.play;
                showUI(); // Показываем интерфейс постоянно при паузе
            }
        }

        playPauseBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
        centerPlayBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
        video.addEventListener('click', togglePlay);

        // --- Звук ---
        function updateVolumeUI() {
            if (video.muted || video.volume == 0) {
                volumeIcon.className = "fas fa-volume-mute";
                volumeSlider.value = 0;
            } else if (video.volume < 0.5) {
                volumeIcon.className = "fas fa-volume-down";
                volumeSlider.value = video.volume;
            } else {
                volumeIcon.className = "fas fa-volume-up";
                volumeSlider.value = video.volume;
            }
        }

        muteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            video.muted = !video.muted;
            if(!video.muted && video.volume === 0) video.volume = 1;
            updateVolumeUI();
        });

        volumeSlider.addEventListener('input', (e) => {
            e.stopPropagation();
            video.volume = e.target.value;
            video.muted = (video.volume == 0);
            updateVolumeUI();
        });

        // Клик по ползунку громкости не должен скрывать UI
        volumeSlider.addEventListener('click', (e) => e.stopPropagation());

        // --- Полноэкранный режим ---
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        }

        fullscreenBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleFullScreen(); });
        video.addEventListener('dblclick', toggleFullScreen); // Двойной клик по видео = фуллскрин

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fsIcon.className = 'fas fa-compress';
            } else {
                fsIcon.className = 'fas fa-expand';
            }
        });
    </script>
</body>
</html>
