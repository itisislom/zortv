<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilmWorks Embed Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: linear-gradient(135deg, #0a1128 0%, #000000 100%); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            color: #fff;
        }

        .player-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            cursor: default;
        }

        .player-container.hide-ui {
            cursor: none;
        }

        video { 
            width: 100%; 
            height: 100%;
            object-fit: contain;
            outline: none;
            pointer-events: auto;
        }

        .player-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
            transition: opacity 0.3s ease;
            pointer-events: none; /* Пропускает клики к видео */
        }

        .player-container.hide-ui .player-ui {
            opacity: 0;
        }

        .player-header {
            padding: 20px 20px 40px 20px;
            background: linear-gradient(to bottom, rgba(6, 11, 25, 0.9) 0%, transparent 100%);
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: auto; /* Возвращает клики на шапку */
        }

        .bottom-controls-wrapper {
            padding: 40px 20px 15px 20px;
            background: linear-gradient(to top, rgba(6, 11, 25, 0.95) 0%, transparent 100%);
            pointer-events: auto; /* Возвращает клики на нижнюю панель */
        }

        .mixed-gradient-text {
            background: linear-gradient(135deg, #ef4444 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 20px;
        }

        .player-title {
            font-size: 16px;
            font-weight: 500;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
        }

        .control-group { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            position: relative;
        }

        .btn {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            width: 30px;
        }

        .btn:hover { color: #60a5fa; }
        .btn:active { transform: scale(0.9); }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 0;
            height: 4px; 
            background: rgba(255, 255, 255, 0.3); 
            border-radius: 2px;
            cursor: pointer;
            transition: width 0.2s ease, margin 0.2s ease;
            opacity: 0;
        }

        .volume-container:hover .volume-slider,
        .volume-slider:focus {
            width: 70px;
            opacity: 1;
            margin-left: 5px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; 
            width: 12px; height: 12px; border-radius: 50%; background: #fff;
        }
        .volume-slider::-webkit-slider-runnable-track { height: 4px; border-radius: 2px; }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #d1d5db;
            text-transform: uppercase;
            cursor: pointer; 
            transition: opacity 0.2s, transform 0.1s;
        }
        .live-badge:hover { opacity: 0.8; }
        .live-badge:active { transform: scale(0.95); }

        .live-dot { width: 8px; height: 8px; background: #6b7280; border-radius: 50%; }
        .live-badge.is-live { color: #e2e8f0; }
        .live-badge.is-live .live-dot {
            background: linear-gradient(135deg, #ef4444 0%, #3b82f6 100%);
            box-shadow: 0 0 8px rgba(139, 92, 246, 0.6);
        }

        .settings-menu {
            position: absolute;
            bottom: 45px;
            right: 0;
            background: rgba(6, 11, 25, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 8px;
            padding: 8px 0;
            display: none;
            flex-direction: column;
            min-width: 160px;
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .settings-menu.show { display: flex; }

        .settings-section-title {
            padding: 6px 16px;
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .settings-divider {
            height: 1px;
            background: rgba(59, 130, 246, 0.2);
            margin: 4px 0;
        }

        .settings-item {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 13px;
            color: #cbd5e1;
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .settings-item:hover {
            background: rgba(59, 130, 246, 0.2);
            color: #fff;
        }

        .settings-item.active {
            color: #60a5fa;
            font-weight: 600;
        }
        
        .settings-item.active::before {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 12px;
        }

        .footer-credit {
            position: absolute;
            bottom: 55px;
            right: 20px;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            pointer-events: none;
        }
        .footer-credit span { color: rgba(96, 165, 250, 0.6); }

        .center-play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.5);
            background: rgba(6, 11, 25, 0.6);
            border-radius: 50%;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: #fff;
            cursor: pointer;
            /* ВАЖНО: Кнопка не должна блокировать тапы по центру, если видео играет */
            pointer-events: none; 
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 15;
            padding-left: 5px;
        }
        
        .player-container.is-paused .center-play {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            /* Делаем её кликабельной только когда видео на паузе */
            pointer-events: auto; 
        }
        .player-container.is-paused.hide-ui .center-play {
            opacity: 0; 
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .player-header { padding: 15px; }
            .bottom-controls-wrapper { padding: 30px 15px 10px 15px; }
            .volume-slider { width: 60px; opacity: 1; margin-left: 5px; }
            .control-group { gap: 12px; }
            .footer-credit { display: none; }
            .settings-menu { right: -10px; }
        }
    </style>
</head>
<body>

    <div class="player-container is-paused" id="playerContainer">
        
        <!-- Само видео, которое реагирует на тапы -->
        <video id="videoPlayer" playsinline></video>

        <!-- Центральная кнопка Play -->
        <div class="center-play" id="centerPlayBtn">
            <i class="fas fa-play"></i>
        </div>

        <!-- Оверлей управления -->
        <div class="player-ui">
            <div class="player-header">
                <i class="fa-solid fa-satellite-dish mixed-gradient-text"></i>
                <div class="player-title" id="headerText">Трансляция ZO'R TV от FilmWorks</div>
            </div>

            <div class="footer-credit">Made by <span>Islom Sadriddinov</span></div>

            <div class="bottom-controls-wrapper">
                <div class="controls-row">
                    
                    <div class="control-group">
                        <button class="btn" id="playPauseBtn" title="Воспроизвести (Пробел)">
                            <i class="fas fa-play" id="playIcon"></i>
                        </button>
                        
                        <div class="volume-container">
                            <button class="btn" id="muteBtn" title="Звук (M)">
                                <i class="fas fa-volume-up" id="volumeIcon"></i>
                            </button>
                            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">
                        </div>

                        <div class="live-badge" id="liveBadge" title="Вернуться в прямой эфир">
                            <div class="live-dot"></div> <span id="liveText">Синхронизация...</span>
                        </div>
                    </div>

                    <div class="control-group">
                        <button class="btn" id="pipBtn" title="Мини-плеер (Pop-up)">
                            <i class="fa-solid fa-clone"></i>
                        </button>

                        <button class="btn" id="settingsBtn" title="Настройки">
                            <i class="fas fa-cog"></i>
                        </button>
                        
                        <div class="settings-menu" id="settingsMenu">
                            <!-- Пункты генерируются через JS -->
                        </div>

                        <button class="btn" id="fullscreenBtn" title="Во весь экран (F)">
                            <i class="fas fa-expand" id="fsIcon"></i>
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        const dictionary = {
            ru: { header: "Трансляция ZO'R TV", play: "Воспроизвести", pause: "Пауза", syncing: "Синхронизация...", connected: "Эфир", auto: "Авто", pip: "Мини-плеер" },
            uz: { header: "ZO'R TV jonli efiri", play: "Ijro etish", pause: "To'xtatish", syncing: "Sinxron...", connected: "Efir", auto: "Avto", pip: "Mini-pleyer" }
        };

        const userLang = navigator.language.toLowerCase().includes('uz') ? 'uz' : 'ru';
        const t = dictionary[userLang];

        document.getElementById('headerText').innerText = t.header;
        document.getElementById('liveText').innerText = t.syncing;
        document.getElementById('pipBtn').title = t.pip;

        const container = document.getElementById('playerContainer');
        const video = document.getElementById('videoPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const centerPlayBtn = document.getElementById('centerPlayBtn');
        const playIcon = document.getElementById('playIcon');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsMenu = document.getElementById('settingsMenu');
        const pipBtn = document.getElementById('pipBtn');
        const liveBadge = document.getElementById('liveBadge');
        
        let hlsPlayer; 

        const videoSrc = "https://stream8-uzbeeline.platform24.tv/mbrjwt/3b3bd2185a7c7e3403270d0cb06f5d2c77837e90-4783-0-uzt6061235-5-1587428585-1784054005-e128-66TRwuSTmhXtawqp1n38u_YUCHBbcGfaPqBe22_Oukc/0.m3u8?pid=256";
        const audioSrcRu = "https://stream8-uzbeeline.platform24.tv/mbrjwt/3b3bd2185a7c7e3403270d0cb06f5d2c77837e90-4783-0-uzt6061235-5-1587428585-1784054005-e128-66TRwuSTmhXtawqp1n38u_YUCHBbcGfaPqBe22_Oukc/2.m3u8?pid=259";
        const audioSrcUz = audioSrcRu.replace("2.m3u8", "3.m3u8"); // Не забудьте указать точную ссылку для узбекского языка

        const masterManifest = `
#EXTM3U
#EXT-X-MEDIA:TYPE=AUDIO,GROUP-ID="audio_group",LANGUAGE="ru",NAME="Русский",DEFAULT=YES,AUTOSELECT=YES,URI="${audioSrcRu}"
#EXT-X-MEDIA:TYPE=AUDIO,GROUP-ID="audio_group",LANGUAGE="uz",NAME="O'zbekcha",DEFAULT=NO,AUTOSELECT=YES,URI="${audioSrcUz}"
#EXT-X-STREAM-INF:BANDWIDTH=2500000,AUDIO="audio_group"
${videoSrc}
        `.trim();

        if (Hls.isSupported()) {
            const blob = new Blob([masterManifest], { type: 'application/vnd.apple.mpegurl' });
            const blobUrl = URL.createObjectURL(blob);
            hlsPlayer = new Hls({ liveSyncDurationCount: 3, maxBufferLength: 8, enableWorker: true });

            hlsPlayer.loadSource(blobUrl);
            hlsPlayer.attachMedia(video);

            hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function(event, data) {
                document.getElementById('liveText').innerText = t.connected;
                liveBadge.classList.add('is-live');
                buildSettingsMenu();
            });

            hlsPlayer.on(Hls.Events.LEVEL_SWITCHED, updateSettingsMenuUI);
            hlsPlayer.on(Hls.Events.AUDIO_TRACK_SWITCHED, updateSettingsMenuUI);

            hlsPlayer.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hlsPlayer.startLoad();
                    else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hlsPlayer.recoverMediaError();
                }
            });
        }

        // --- Перемотка в эфир ---
        liveBadge.addEventListener('click', (e) => {
            e.stopPropagation();
            if (hlsPlayer && hlsPlayer.liveSyncPosition) {
                video.currentTime = hlsPlayer.liveSyncPosition;
            } else if (video.duration) {
                video.currentTime = video.duration;
            }
            if (video.paused) togglePlay();
        });

        // --- Меню настроек ---
        function buildSettingsMenu() {
            settingsMenu.innerHTML = '';
            
            const qualTitle = document.createElement('div');
            qualTitle.className = 'settings-section-title';
            qualTitle.innerText = 'Качество';
            settingsMenu.appendChild(qualTitle);

            const autoBtn = document.createElement('div');
            autoBtn.className = 'settings-item qual-item active';
            autoBtn.innerText = t.auto;
            autoBtn.dataset.level = -1;
            autoBtn.onclick = (e) => { e.stopPropagation(); setQuality(-1); };
            settingsMenu.appendChild(autoBtn);

            hlsPlayer.levels.forEach((level, index) => {
                const item = document.createElement('div');
                item.className = 'settings-item qual-item';
                let label = level.height ? `${level.height}p` : (level.bitrate ? `${Math.round(level.bitrate/1000)} kbps` : `Уровень ${index+1}`);
                item.innerText = label;
                item.dataset.level = index;
                item.onclick = (e) => { e.stopPropagation(); setQuality(index); };
                settingsMenu.appendChild(item);
            });

            if (hlsPlayer.audioTracks && hlsPlayer.audioTracks.length > 1) {
                const divider = document.createElement('div');
                divider.className = 'settings-divider';
                settingsMenu.appendChild(divider);

                const audioTitle = document.createElement('div');
                audioTitle.className = 'settings-section-title';
                audioTitle.innerText = 'Аудио';
                settingsMenu.appendChild(audioTitle);

                hlsPlayer.audioTracks.forEach((track, index) => {
                    const item = document.createElement('div');
                    item.className = 'settings-item audio-item';
                    item.innerText = track.name || track.lang || `Дорожка ${index + 1}`;
                    item.dataset.audioId = track.id;
                    item.onclick = (e) => { e.stopPropagation(); setAudioTrack(track.id); };
                    settingsMenu.appendChild(item);
                });
            }
            updateSettingsMenuUI();
        }

        function setQuality(levelIndex) {
            hlsPlayer.currentLevel = levelIndex;
            settingsMenu.classList.remove('show');
            updateSettingsMenuUI();
        }

        function setAudioTrack(trackId) {
            hlsPlayer.audioTrack = trackId;
            settingsMenu.classList.remove('show');
            updateSettingsMenuUI();
        }

        function updateSettingsMenuUI() {
            settingsMenu.querySelectorAll('.qual-item').forEach(item => {
                if (hlsPlayer.autoLevelEnabled && item.dataset.level == -1) item.classList.add('active');
                else if (!hlsPlayer.autoLevelEnabled && item.dataset.level == hlsPlayer.currentLevel) item.classList.add('active');
                else item.classList.remove('active');
            });
            
            settingsMenu.querySelectorAll('.audio-item').forEach(item => {
                if (parseInt(item.dataset.audioId) === hlsPlayer.audioTrack) item.classList.add('active');
                else item.classList.remove('active');
            });
        }

        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsMenu.classList.toggle('show');
        });

        document.addEventListener('click', (e) => {
            if (!settingsMenu.contains(e.target) && !settingsBtn.contains(e.target)) {
                settingsMenu.classList.remove('show');
            }
        });

        // --- Picture in Picture ---
        if (!('pictureInPictureEnabled' in document) && !video.webkitSetPresentationMode) {
            pipBtn.style.display = 'none';
        }

        pipBtn.addEventListener('click', async (e) => {
            e.stopPropagation();
            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                } else if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                } else if (video.webkitSetPresentationMode) {
                    video.webkitSetPresentationMode(video.webkitPresentationMode === "picture-in-picture" ? "inline" : "picture-in-picture");
                }
            } catch (error) {
                console.error("Ошибка при переходе в режим мини-плеера:", error);
            }
        });

        // --- Улучшенная логика скрытия UI и тапов для мобилок ---
        let uiTimeout;
        function showUI() {
            container.classList.remove('hide-ui');
            clearTimeout(uiTimeout);
            if (!video.paused) {
                uiTimeout = setTimeout(() => {
                    if (!settingsMenu.classList.contains('show')) container.classList.add('hide-ui');
                }, 2500);
            }
        }

        // Для ПК - при движении мыши
        container.addEventListener('mousemove', showUI);
        
        // Клик по любому месту контейнера (кроме видео) сохраняет UI открытым
        container.addEventListener('click', showUI);

        // Клик/Тап именно по видео (решает проблему с телефонами)
        let lastClickTime = 0;
        video.addEventListener('click', (e) => {
            e.stopPropagation(); // Не дает событию уйти в container
            const currentTime = new Date().getTime();
            
            // Если двойной тап (меньше 300мс)
            if (currentTime - lastClickTime < 300) {
                togglePlay();
                lastClickTime = 0; 
            } else {
                // Если одинарный тап
                if (container.classList.contains('hide-ui')) {
                    showUI(); // Показываем интерфейс
                } else {
                    container.classList.add('hide-ui'); // Скрываем интерфейс
                    clearTimeout(uiTimeout);
                }
                lastClickTime = currentTime;
            }
        });

        function togglePlay() {
            if (video.paused) {
                video.play();
                container.classList.remove('is-paused');
                document.getElementById('playIcon').className = "fas fa-pause";
                playPauseBtn.title = t.pause;
                showUI();
            } else {
                video.pause();
                container.classList.add('is-paused');
                document.getElementById('playIcon').className = "fas fa-play";
                playPauseBtn.title = t.play;
                showUI();
            }
        }

        playPauseBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
        
        // Центральная кнопка теперь кликабельна ТОЛЬКО на паузе
        centerPlayBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });

        // --- Звук ---
        const volumeSlider = document.getElementById('volumeSlider');
        const muteBtn = document.getElementById('muteBtn');
        const volumeIcon = document.getElementById('volumeIcon');

        function updateVolumeUI() {
            if (video.muted || video.volume == 0) {
                volumeIcon.className = "fas fa-volume-mute";
                volumeSlider.value = 0;
            } else if (video.volume < 0.5) {
                volumeIcon.className = "fas fa-volume-down";
                volumeSlider.value = video.volume;
            } else {
                volumeIcon.className = "fas fa-volume-up";
                volumeSlider.value = video.volume;
            }
        }

        function toggleMute() {
            video.muted = !video.muted;
            if(!video.muted && video.volume === 0) video.volume = 1;
            updateVolumeUI();
        }

        muteBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleMute(); });
        volumeSlider.addEventListener('input', (e) => {
            e.stopPropagation();
            video.volume = e.target.value;
            video.muted = (video.volume == 0);
            updateVolumeUI();
        });
        volumeSlider.addEventListener('click', (e) => e.stopPropagation());

        // --- Полноэкранный режим ---
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const fsIcon = document.getElementById('fsIcon');

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        }

        fullscreenBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleFullScreen(); });

        document.addEventListener('fullscreenchange', () => {
            fsIcon.className = document.fullscreenElement ? 'fas fa-compress' : 'fas fa-expand';
        });

        // --- Горячие клавиши (M, F, Space) ---
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName.toLowerCase() === 'input' || e.target.tagName.toLowerCase() === 'textarea') return;
            const key = e.key.toLowerCase();
            
            if (key === 'm' || key === 'ь') toggleMute();
            else if (key === 'f' || key === 'а') toggleFullScreen();
            else if (e.code === 'Space') {
                e.preventDefault(); 
                togglePlay();
            }
        });
    </script>
</body>
</html>
